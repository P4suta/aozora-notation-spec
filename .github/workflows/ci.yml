name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    # Skip for dependabot (its subjects/bodies exceed 50/72 and its PRs
    # squash-merge with a maintainer subject). Guard on the PR *author*,
    # not `github.actor`, so a maintainer `gh pr update-branch` on a bot
    # PR doesn't flip the guard and fail the lint (P4suta/aozora#113).
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4.2.1
      # Lint only non-merge commits: `committed` flags any merge commit
      # ("Merge branch 'main' …") as "Missing type", so a maintainer
      # `gh pr update-branch` merge must not reach it (P4suta/aozora#113).
      # `committed` takes a single revspec, so feed SHAs one per
      # invocation (`-rn1`); a multi-commit PR would otherwise pass
      # several positionals at once and abort with "unexpected argument".
      - name: Check Conventional Commits (committed)
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          git rev-list --no-merges "$base..$head" | xargs -rn1 committed

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # mise provisions typos + taplo (and the rest) from mise.toml.
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4.2.1
      - name: Spell-check (typos)
        run: typos
      - name: TOML formatting (taplo)
        run: taplo fmt --check

  spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # mise provisions mdBook (precompiled) + Python 3.12 from mise.toml,
      # so the job no longer compiles mdBook from source.
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea  # v4.2.1

      # Install from the pinned manifest so host == CI and Dependabot
      # (pip ecosystem, /tools) can track the dependency.
      - name: Install Python deps
        run: pip install -r tools/requirements.txt

      - name: Validate conformance vectors
        run: python3 tools/validate_vectors.py

      - name: Check the ABNF grammar
        run: python3 tools/abnf_check.py src/grammar/aozora.abnf

      - name: Check cross-references
        run: python3 tools/linkcheck.py

      - name: Build the book
        run: mdbook build

  # A Release Please PR (labelled `autorelease: pending`) may merge only once a
  # maintainer adds `release: approved` — the deliberate "we are releasing" step.
  # Normal PRs (no `autorelease: pending`) pass unconditionally. Labels are read
  # live, so after labelling, re-run just this job to turn it green (no full CI
  # rerun). Required via the main-branch ruleset, so it actually blocks merge.
  release-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - name: "Require `release: approved` on a Release PR"
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.number }}
          REPO: ${{ github.repository }}
        run: |
          labels=$(gh pr view "$PR" --repo "$REPO" --json labels --jq '.labels[].name')
          if grep -qx 'autorelease: pending' <<<"$labels"; then
            if grep -qx 'release: approved' <<<"$labels"; then
              echo "Release PR is approved — gate open."
            else
              echo "::error::Release PR (autorelease: pending) lacks the 'release: approved' label. Add it deliberately, then re-run this job."
              exit 1
            fi
          else
            echo "Not a Release PR — gate not applicable."
          fi
