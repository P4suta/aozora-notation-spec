name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v2
      - name: Check Conventional Commits (committed)
        run: committed "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

  spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # mise provisions mdBook (precompiled) + Python 3.12 from mise.toml,
      # so the job no longer compiles mdBook from source.
      - uses: jdx/mise-action@v2

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Validate conformance vectors
        run: python3 tools/validate_vectors.py

      - name: Check the ABNF grammar
        run: python3 tools/abnf_check.py src/grammar/aozora.abnf

      - name: Check cross-references
        run: python3 tools/linkcheck.py

      - name: Build the book
        run: mdbook build
