# Automated releases via Release Please (ADR-0006).
#
# Conventional Commits on main → a single Release PR that bumps version.txt
# and CHANGELOG.md and syncs the doc version strings (extra-files). Squash-
# merging that PR cuts the `vX.Y.Z` tag + GitHub Release, and this same run
# attaches the conformance bundle + ABNF as assets.
#
# DORMANT until a release GitHub App is configured: with the App secrets unset
# the gate `HAS_APP` is false and the job is a green no-op. See docs/RELEASING.md.
#
# Why an App (not GITHUB_TOKEN): a token-opened PR does not trigger the required
# CI checks (spec/lint/codeql), so it could never satisfy branch protection.
# Release Please commits through the GitHub API, so its commits are GitHub-signed
# and satisfy require-signed-commits with no ruleset bypass.

name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release        # scopes the App secrets; NO required reviewers
    permissions:
      contents: write           # create the release-please branch, tag, release
      pull-requests: write       # open / maintain the Release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    env:
      # Server-side boolean — never exposes the secret values themselves.
      HAS_APP: ${{ secrets.RELEASE_APP_CLIENT_ID != '' && secrets.RELEASE_APP_PRIVATE_KEY != '' }}
    steps:
      - name: Mint a GitHub App token
        id: app-token
        if: env.HAS_APP == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Release Please
        id: release
        if: env.HAS_APP == 'true'
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          # config-file / manifest-file default to
          # release-please-config.json / .release-please-manifest.json

      - name: Dormant notice
        if: env.HAS_APP != 'true'
        run: |
          echo "::notice title=Release Please dormant::Set the RELEASE_APP_CLIENT_ID and RELEASE_APP_PRIVATE_KEY secrets (a GitHub App) on the 'release' environment to activate. See docs/RELEASING.md."

  # Build the release assets. Ungated, no credentials.
  package:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Assemble conformance bundle + ABNF
        id: assets
        shell: bash
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          stage="${RUNNER_TEMP}/dist"
          mkdir -p "${stage}"

          bundle="aozora-notation-conformance-${TAG}"
          bdir="${RUNNER_TEMP}/${bundle}"
          mkdir -p "${bdir}/schema"
          cp -r conformance/vectors "${bdir}/"
          cp conformance/schema/vector.schema.json "${bdir}/schema/"
          cp conformance/RUNNER.md "${bdir}/"
          ( cd "${RUNNER_TEMP}" && tar czf "${stage}/${bundle}.tar.gz" "${bundle}" )
          ( cd "${RUNNER_TEMP}" && zip -qr "${stage}/${bundle}.zip" "${bundle}" )

          cp src/grammar/aozora.abnf "${stage}/aozora-${TAG}.abnf"
          ( cd "${stage}" && sha256sum -- * > SHA256SUMS )
          echo "dir=${stage}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: ${{ steps.assets.outputs.dir }}
          retention-days: 7

  # Attach the assets to the GitHub Release. Optionally reviewer-gated later.
  upload:
    needs: [release-please, package]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release-assets   # ships with 0 reviewers; add one later to harden
    permissions:
      contents: write             # upload assets to the existing release
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: dist
      - name: Upload assets to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" dist/* --clobber --repo "$GITHUB_REPOSITORY"
