# A Release PR must be merged by a deliberate manual SQUASH-merge — that is the
# one human gate on a release. Auto-merge is a repo-wide feature, so GitHub's
# "Enable auto-merge" button can't be hidden per-PR; instead, if anyone arms
# auto-merge on a Release Please PR, turn it straight back off. Without this,
# pre-arming auto-merge would collapse the deliberate-merge gate into one click.
#
# pull_request_target so this runs from main's definition with a write token; it
# only calls the API to disable auto-merge (never checks out PR code), and the
# guard is scoped to Release Please's own branch, so it never touches normal PRs.

name: no-automerge-on-release-pr

on:
  pull_request_target:
    types: [auto_merge_enabled]

permissions:
  contents: read

jobs:
  disable:
    if: startsWith(github.event.pull_request.head.ref, 'release-please--')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Disable auto-merge on the Release PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$PR" --repo "$REPO" --disable-auto-merge
          gh pr comment "$PR" --repo "$REPO" --body \
            "🔒 Auto-merge was disabled automatically: a release is a deliberate act. Squash-merge this Release PR by hand once the checks are green."
