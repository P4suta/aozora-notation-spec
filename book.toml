[book]
title = "The Aozora Bunko Notation Specification"
description = "A normative, RFC-quality specification of 青空文庫記法 (Aozora Bunko notation)."
authors = ["aozora-notation-spec contributors"]
language = "en"
src = "src"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
no-section-label = false
git-repository-url = "https://github.com/P4suta/aozora-notation-spec"
edit-url-template = "https://github.com/P4suta/aozora-notation-spec/edit/main/{path}"
# Project Pages live under a repo subpath, so absolute URLs (404 page,
# print view) need this base; `mdbook serve` overrides it locally.
site-url = "/aozora-notation-spec/"

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
