# TOML formatting policy (taplo), enforced via `taplo fmt --check`
# (see the justfile `fmt-check` recipe and the CI `lint` job). Validity
# alone (`taplo check`) is not enough — formatting is part of the
# convention, matching the sibling aozora repo's taplo policy.

# taplo does not honor .gitignore, so exclude the generated book dir.
exclude = ["book/**"]

[formatting]
align_entries = false # no `=` alignment — taplo default
align_comments = false # keep a trailing comment one space after the value
column_width = 100
indent_string = "  " # two spaces
reorder_keys = false # key order is semantically meaningful
reorder_arrays = false
array_auto_collapse = false # keep intentionally-multiline arrays expanded
